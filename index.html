                            <button class="nav-btn" id="nav-back-${app.id}"><i class="fas fa-arrow-left"></i></button>
                            <button class="nav-btn" id="nav-forward-${app.id}"><i class="fas fa-arrow-right"></i></button>
                            <button class="nav-btn" id="nav-refresh-${app.id}"><i class="fas fa-redo"></i></button>
                            <div class="address-bar">
                                <i class="fas fa-lock" style="font-size: 12px; color: #10b981;"></i>
                                <input type="text" id="url-input-${app.id}" value="${startUrl}" spellcheck="false">
                            </div>
                            <button class="nav-btn" id="nav-go-${app.id}"><i class="fas fa-chevron-right"></i></button>
                        </div>
                        <div class="browser-content">
                            <div class="browser-loading" id="loading-${app.id}">
                                <i class="fas fa-circle-notch fa-spin" style="font-size: 32px; color: var(--primary); margin-bottom: 12px;"></i>
                            </div>
                            <iframe id="frame-${app.id}" class="browser-iframe" src="${startUrl}" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-downloads"></iframe>
                        </div>
                    `;

                    let historyStack = [startUrl];
                    let currentIndex = 0;
                    if (runningApps[app.id] && runningApps[app.id].componentData) {
                        historyStack = runningApps[app.id].componentData.history;
                        currentIndex = runningApps[app.id].componentData.index;
                    }

                    setTimeout(() => {
                        const urlInput = wrap.querySelector(`#url-input-${app.id}`);
                        const frame = wrap.querySelector(`#frame-${app.id}`);
                        const loading = wrap.querySelector(`#loading-${app.id}`);
                        const goBtn = wrap.querySelector(`#nav-go-${app.id}`);
                        const refreshBtn = wrap.querySelector(`#nav-refresh-${app.id}`);
                        const backBtn = wrap.querySelector(`#nav-back-${app.id}`);
                        const fwdBtn = wrap.querySelector(`#nav-forward-${app.id}`);

                        const updateUI = () => {
                            backBtn.disabled = currentIndex === 0;
                            fwdBtn.disabled = currentIndex === historyStack.length - 1;
                            urlInput.value = historyStack[currentIndex];
                            if (runningApps[app.id]) {
                                runningApps[app.id].componentData = { history: historyStack, index: currentIndex };
                            }
                        };

                        const loadFrame = (url) => {
                            loading.classList.add('active');
                            frame.src = url;
                        };

                        const navigate = () => {
                            let url = urlInput.value.trim();
                            if (!url.startsWith('http') && !url.startsWith('blob:') && !url.startsWith('file:')) {
                                url = 'https://' + url;
                            }
                            
                            // Optional: Proxy for CORS issues
                            // let proxiedUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                            
                            if (url !== historyStack[currentIndex]) {
                                historyStack = historyStack.slice(0, currentIndex + 1);
                                historyStack.push(url);
                                currentIndex++;
                            }
                            updateUI();
                            loadFrame(url); 
                        };

                        urlInput.onkeydown = e => { if (e.key === 'Enter') navigate(); };
                        goBtn.onclick = navigate;

                        refreshBtn.onclick = () => {
                            loading.classList.add('active');
                            const currentUrl = frame.src;
                            frame.src = 'about:blank';
                            setTimeout(() => { frame.src = currentUrl; }, 10);
                        };

                        frame.onload = () => loading.classList.remove('active');

                        backBtn.onclick = () => {
                            if (currentIndex > 0) {
                                currentIndex--;
                                loadFrame(historyStack[currentIndex]);
                                updateUI();
                            }
                        };

                        fwdBtn.onclick = () => {
                            if (currentIndex < historyStack.length - 1) {
                                currentIndex++;
                                loadFrame(historyStack[currentIndex]);
                                updateUI();
                            }
                        };

                        updateUI();
                        if (runningApps[app.id] && runningApps[app.id].componentData) {
                            loadFrame(historyStack[currentIndex]);
                        }
                    }, 50);
                } else if (app.component === 'notepad') {
                    let textarea = document.createElement('textarea');
                    textarea.className = 'native-notepad';
                    textarea.placeholder = 'Type here... Unsaved changes are tracked.';
                    textarea.oninput = () => {
                        if (runningApps[app.id]) runningApps[app.id].unsavedFlag = true;
                        hasUnsavedChanges = true;
                    };
                    wrap.appendChild(textarea);
                    if (runningApps[app.id] && runningApps[app.id].componentData) {
                        textarea.value = runningApps[app.id].componentData;
                    }
                } else if (app.component === 'calculator') {
                    let disp = document.createElement('div');
                    disp.className = 'calc-display';
                    disp.id = `calcDisp-${app.id}`;
                    disp.innerText = '0';
                    let calcGrid = document.createElement('div');
                    calcGrid.className = 'calc-grid';
                    const btns = ['7', '8', '9', '/', '4', '5', '6', '*', '1', '2', '3', '-', 'C', '0', '=', '+'];
                    btns.forEach(btn => {
                        let b = document.createElement('button');
                        b.className = `calc-btn ${isNaN(btn) && btn!=='.' ? 'op':''}`;
                        b.innerText = btn;
                        b.onclick = () => calcPress(btn, app.id);
                        calcGrid.appendChild(b);
                    });
                    wrap.appendChild(disp);
                    wrap.appendChild(calcGrid);
                    if (runningApps[app.id] && runningApps[app.id].componentData) {
                        disp.innerText = runningApps[app.id].componentData;
                    }
                } else if (app.component === 'paint') {
                    let canvas = document.createElement('canvas');
                    canvas.id = `canvas-${app.id}`;
                    canvas.style.background = 'white';
                    canvas.style.borderRadius = '8px';
                    canvas.style.flex = '1';
                    canvas.style.touchAction = 'none';
                    wrap.appendChild(canvas);
                    setTimeout(() => initPaint(canvas, app.id), 100);
                    if (runningApps[app.id] && runningApps[app.id].componentData) {
                        const img = new Image();
                        img.onload = () => canvas.getContext('2d').drawImage(img, 0, 0);
                        img.src = runningApps[app.id].componentData;
                    }
                }
                return wrap;
            }
            return wrap;
        }

        let calcExpr = '';
        window.calcPress = function(val, id) {
            const disp = document.getElementById(`calcDisp-${id}`);
            if (!disp) return;
            if (val === 'C') calcExpr = '';
            else if (val === '=') { try { calcExpr = String(eval(calcExpr)); } catch (e) { calcExpr = 'Err'; } } else calcExpr +=
                val;
            disp.innerText = calcExpr || '0';
            if (runningApps[id]) {
                runningApps[id].unsavedFlag = true;
                runningApps[id].componentData = disp.innerText;
                hasUnsavedChanges = true;
            }
        };

        function initPaint(canvas, appId) {
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let drawing = false;
            canvas.width = canvas.parentElement.clientWidth || 400;
            canvas.height = (canvas.parentElement.clientHeight || 400) - 60;
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#000';
            canvas.onpointerdown = e => { drawing = true;
                ctx.beginPath();
                ctx.moveTo(e.offsetX, e.offsetY); };
            canvas.onpointermove = e => { if (drawing) { ctx.lineTo(e.offsetX, e.offsetY);
                    ctx.stroke(); } };
            canvas.onpointerup = () => drawing = false;
            canvas.onpointercancel = () => drawing = false;
            setInterval(() => {
                if (runningApps[appId] && canvas.toDataURL) {
                    runningApps[appId].componentData = canvas.toDataURL();
                    runningApps[appId].unsavedFlag = true;
                    hasUnsavedChanges = true;
                }
            }, 1000);
        }

        // ═══════════════════════════════════════════════════════════════════
        //  LAUNCH APP
        // ═══════════════════════════════════════════════════════════════════
        function launchApp(id) {
            haptic();
            const app = findAppById(id);
            if (!app) { toast('App not found'); return; }

            // === 3‑App Limit (Step 1) ===
            const runningIds = Object.keys(runningApps);
            if (runningIds.length >= 3 && !runningApps[id]) {
                let oldestId = runningIds.reduce((a, b) => {
                    return (runningApps[a].lastActive || 0) < (runningApps[b].lastActive || 0) ? a : b;
                });
                const oldest = runningApps[oldestId];
                if (oldest && oldest.unsavedFlag) {
                    sysDialog({
                        title: 'App Limit Reached (3/3)',
                        message: `"${oldest.app.name}" has unsaved changes. Close it to open "${findAppById(id).name}"?`,
                        buttons: [
                            { label: 'Cancel', value: false, primary: false },
                            { label: 'Close & Open', value: true, danger: true }
                        ]
                    }).then(confirmed => {
                        if (confirmed) {
                            closeApp(oldestId, true);
                            launchApp(id);
                        }
                    });
                    return;
                } else {
                    closeApp(oldestId, true);
                    launchApp(id);
                    return;
                }
            }

            // === Initialize or restore app state ===
            if (!runningApps[id]) {
                const savedState = localStorage.getItem('runningAppsState');
                let savedData = null;
                if (savedState) {
                    try {
                        const parsed = JSON.parse(savedState);
                        if (parsed[id]) {
                            savedData = parsed[id];
                        }
                    } catch (e) {}
                }
                runningApps[id] = {
                    app: app,
                    contentNode: generateAppContent(app),
                    winEl: null,
                    unsavedFlag: savedData ? savedData.unsavedFlag || false : false,
                    componentData: savedData ? savedData.componentData || null : null,
                    scrollY: savedData ? savedData.scrollY || 0 : 0,
                    lastActive: Date.now(),
                    focusedSelector: savedData ? savedData.focusedSelector || null : null,
                    // Stores the iframe when we detach it from #modalContent while switching apps
                    detachedIframe: null
                };
            } else {
                runningApps[id].lastActive = Date.now();
            }

            // ✅ SAFETY GUARD: If contentNode is not a valid DOM node, rebuild it
            if (!runningApps[id].contentNode || !(runningApps[id].contentNode instanceof Node)) {
                console.warn(`Rebuilding invalid contentNode for app: ${app.name}`);
                runningApps[id].contentNode = generateAppContent(app);
            }
            runningApps[id].active = true;
            lastActiveAppId = id;

            // === Mobile launch (Step 3: requestAnimationFrame polish + iframe state preservation) ===
            if (isMobile() && !document.body.classList.contains('desktop-mode')) {
                modal.classList.remove('open');
                
                // Force a micro-delay so the CSS animation restarts smoothly
                requestAnimationFrame(() => {
                    modalTitle.innerText = app.name;
                    let content = runningApps[id].contentNode;

                    if (!content || typeof content.querySelector !== 'function') {
                        console.warn(`⚠️ ContentNode for ${app.name} was null. Regenerating...`);
                        content = generateAppContent(app);
                        runningApps[id].contentNode = content;
                    }

                    const mc = document.getElementById('modalContent');

                    // --- iframe state preservation (Step 2) ---
                    if (app.type === 'iframe') {
                        // Before attaching the new iframe, detach (but don't delete) the previous iframe
                        const previousIframe = mc.querySelector('iframe');
                        if (previousIframe) {
                            // Save previous iframe to its app's stored node so it can be re-used later
                            const prevAppId = lastActiveAppId;
                            if (prevAppId && runningApps[prevAppId]) {
                                runningApps[prevAppId].detachedIframe = previousIframe;
                            }
                            mc.innerHTML = ''; // Clear the container (iframe already detached)
                        } else {
                            mc.innerHTML = '';
                        }

                        const existingIframe = content.querySelector('iframe');
                        if (existingIframe) {
                            mc.appendChild(existingIframe);
                            if (runningApps[id].scrollY) {
                                existingIframe.onload = () => { existingIframe.contentWindow?.scrollTo(0, runningApps[id]
                                        .scrollY); };
                            }
                        }
                    } else {
                        // Native app launch
                        mc.innerHTML = '';
                        if (content instanceof Node) {
                            mc.appendChild(content);
                        } else {
                            console.error(`❌ content is not a Node for ${app.name}`);
                        }
                    }

                    modal.classList.add('open');
                    notifDrawer.classList.add('higher');
                });
            } else if (document.body.classList.contains('desktop-mode')) {
                // === Desktop launch ===
                if (!runningApps[id].winEl) {
                    runningApps[id].winEl = createDesktopWindow(id, app, runningApps[id].contentNode);
                }
                runningApps[id].winEl.style.display = 'flex';
                bringToFront(runningApps[id].winEl);
                updateTaskbar();
                setTimeout(() => {
                    const iframe = runningApps[id].contentNode.querySelector('iframe');
                    if (iframe && iframe.contentWindow) {
                        const rect = runningApps[id].winEl.getBoundingClientRect();
                        iframe.contentWindow.postMessage({ type: 'iframeResize', width: rect.width, height: rect
                                .height - 40 }, '*');
                    }
                }, 100);
            }

            // === Update recents ===
            recentApps = recentApps.filter(a => a.id !== app.id);
            recentApps.unshift({ id: app.id, name: app.name, url: app.url, icon: app.icon || 'globe' });
            if (recentApps.length > 10) recentApps.pop();
            localStorage.setItem('recentApps', JSON.stringify(recentApps));
            renderRecentsDrawer();

            // === Safety: If more than 3 are now open, close the oldest non-active one ===
            setTimeout(() => {
                const runningIds = Object.keys(runningApps);
                if (runningIds.length > 3) {
                    let oldestId = runningIds.reduce((a, b) => {
                        return (runningApps[a].lastActive || 0) < (runningApps[b].lastActive || 0) ? a : b;
                    });
                    if (oldestId !== id) {
                        closeApp(oldestId, true);
                    }
                }
            }, 100);

            // === Notify iframe that it is visible ===
            setTimeout(() => {
                if (app.type === 'iframe') {
                    const iframe = runningApps[id].contentNode.querySelector('iframe') || modalIframe;
                    if (iframe) iframe.contentWindow?.postMessage({ type: 'containerVisibility', visible: true }, '*');
                }
            }, 100);
        }
        function closeApp(id, force = false) {
            haptic(true);
            const app = runningApps[id];
            if (!app) return;
            if (app.unsavedFlag && !force) {
                sysDialog({
                    title: 'Unsaved Changes',
                    message: `You have unsaved changes in "${app.app.name}". Close anyway?`,
                    buttons: [
                        { label: 'Cancel', value: false, primary: false },
                        { label: 'Close', value: true, danger: true }
                    ]
                }).then(confirmed => {
                    if (confirmed) doCloseApp(id);
                });
            } else {
                doCloseApp(id);
            }
        }

        function doCloseApp(id) {
            const app = runningApps[id];
            if (!app) return;
            if (app.app.type === 'native') {
                if (app.app.component === 'notepad') {
                    const ta = app.contentNode.querySelector('textarea');
                    if (ta) app.componentData = ta.value;
                } else if (app.app.component === 'paint') {
                    // auto-saved
                } else if (app.app.component === 'calculator') {
                    const d = app.contentNode.querySelector('.calc-display');
                    if (d) app.componentData = d.innerText;
                }
            }
            if (app.app.type === 'iframe') {
                const iframe = app.contentNode.querySelector('iframe') || modalIframe;
                if (iframe && iframe.contentWindow) {
                    app.scrollY = iframe.contentWindow.scrollY;
                    const active = iframe.contentDocument?.activeElement;
                    if (active && active.id) app.focusedSelector = '#' + active.id;
                    else if (active && active.className) app.focusedSelector = '.' + active.className.split(' ').join(
                    '.');
                }
                iframe?.contentWindow?.postMessage({ type: 'disposeResources' }, '*');
            }
            if (isMobile() && !document.body.classList.contains('desktop-mode')) {
                modal.classList.remove('open');
                notifDrawer.classList.remove('higher');
            } else if (document.body.classList.contains('desktop-mode')) {
                if (app.winEl) {
                    app.winEl.remove();
                    app.winEl = null;
                }
            }
            app.active = false;
            delete runningApps[id];
            updateTaskbar();
            if (lastActiveAppId === id) lastActiveAppId = null;
            hasUnsavedChanges = Object.values(runningApps).some(a => a.unsavedFlag === true);
        }

        function closeModal() {
            const activeId = Object.keys(runningApps).find(id => runningApps[id].active);
            if (activeId) closeApp(activeId);
            else modal.classList.remove('open');
        }

        // ═══════════════════════════════════════════════════════════════════
        //  DESKTOP WINDOW MANAGEMENT
        // ═══════════════════════════════════════════════════════════════════
        function createDesktopWindow(id, app, contentNode) {
            const win = document.createElement('div');
            win.className = 'window';
            win.id = `win-${id}`;
            const offset = Math.min(Object.keys(runningApps).length * 30, 200);
            win.style.top = `${50 + offset}px`;
            win.style.left = `${50 + offset}px`;
            win.style.width = '600px';
            win.style.height = '450px';
            win.innerHTML = `
            <div class="win-header">
              <div style="font-size:12px; font-weight:500;"><i class="fas ${app.icon || 'fa-globe'}" style="margin-right:6px;"></i>${escapeHtml(app.name)}</div>
              <div class="win-controls">
                <button class="win-btn win-min" onclick="minimizeWindow('${id}')"></button>
                <button class="win-btn win-max" onclick="maximizeWindow('${id}')"></button>
                <button class="win-btn win-close" onclick="closeApp('${id}')"></button>
              </div>
            </div>
            <div class="win-content"></div>
          `;
            windowContainer.appendChild(win);
            // ✅ SAFETY GUARD: Ensure contentNode is a valid Node before appending
            if (contentNode instanceof Node) {
                win.querySelector('.win-content').appendChild(contentNode);
            } else {
                console.error(`❌ contentNode is not a Node for app: ${app.name}. Rebuilding...`);
                // Generate a fresh content node and append it
                const freshNode = generateAppContent(app);
                if (freshNode instanceof Node) {
                    win.querySelector('.win-content').appendChild(freshNode);
                    // Update the stored app contentNode so it remains valid
                    if (runningApps[id]) {
                        runningApps[id].contentNode = freshNode;
                    }
                } else {
                    // If even regeneration fails, show an error placeholder
                    const errorDiv = document.createElement('div');
                    errorDiv.style.cssText = `
                        display: flex; align-items: center; justify-content: center;
                        background: var(--surface-solid); color: var(--danger);
                        height: 100%; width: 100%; font-size: 14px; padding: 20px; text-align: center;
                    `;
                    errorDiv.textContent = '⚠️ App failed to load. Please restart.';
                    win.querySelector('.win-content').appendChild(errorDiv);
                }
            }
            makeDraggable(win);
            win.onmousedown = () => bringToFront(win);
        // Fix: ensure clicking inside the iframe also brings window to front
win.addEventListener('pointerdown', () => {
    bringToFront(win);
}, { capture: true }); 
// Using 'capture: true' intercepts the click before the inner app can swallow it.

        // Restore scroll position after iframe loads
        const iframe = contentNode.querySelector('iframe');
        if (iframe) {
            iframe.addEventListener('load', () => {
                if (runningApps[id] && runningApps[id].scrollY) {
                    iframe.contentWindow?.scrollTo(0, runningApps[id].scrollY);
                }
            });
        }

            return win;
        }

        window.minimizeWindow = function(id) {
            if (runningApps[id] && runningApps[id].winEl) {
                runningApps[id].winEl.style.display = 'none';
                runningApps[id].active = false;
                updateTaskbar();
            }
        };

        window.maximizeWindow = function(id) {
            const win = runningApps[id]?.winEl;
            if (!win) return;
            if (win.dataset.max === 'true') {
                win.style.width = win.dataset.w;
                win.style.height = win.dataset.h;
                win.style.top = win.dataset.t;
                win.style.left = win.dataset.l;
                win.dataset.max = 'false';
            } else {
                win.dataset.w = win.style.width;
                win.dataset.h = win.style.height;
                win.dataset.t = win.style.top;
                win.dataset.l = win.style.left;
                win.style.width = '100vw';
                win.style.height = 'calc(100vh - 50px)';
                win.style.top = '0';
                win.style.left = '0';
                win.dataset.max = 'true';
            }
        };

        function bringToFront(win) {
            zIndexCounter++;
            win.style.zIndex = zIndexCounter;
        }

        function makeDraggable(win) {
            const handle = win.querySelector('.win-header');
            let isDragging = false,
                startX, startY, startLeft, startTop;
            handle.onpointerdown = e => {
                if (e.target.closest('.win-controls') || win.dataset.max === 'true') return;
                isDragging = true;
                bringToFront(win);
                startX = e.clientX;
                startY = e.clientY;
                startLeft = win.offsetLeft;
                startTop = win.offsetTop;
                handle.setPointerCapture(e.pointerId);
            };
            handle.onpointermove = e => {
                if (!isDragging) return;
                win.style.left = startLeft + (e.clientX - startX) + 'px';
                win.style.top = Math.max(0, Math.min(window.innerHeight - 60, startTop + (e.clientY - startY))) + 'px';
            };
            handle.onpointerup = () => isDragging = false;
            handle.onpointercancel = () => isDragging = false;
        }

        function updateTaskbar() {
            if (!taskbarApps) return;
            taskbarApps.innerHTML = '';
            Object.keys(runningApps).forEach(id => {
                const app = runningApps[id].app;
                let div = document.createElement('div');
                div.className = `taskbar-item ${runningApps[id].active ? 'active' : ''}`;
                let badge = '';
                if (app.notificationCount && app.notificationCount > 0) {
                    badge = `<div class="taskbar-badge">${app.notificationCount}</div>`;
                }
                div.innerHTML = `<i class="fas ${app.icon || 'fa-globe'}"></i> ${escapeHtml(app.name)}${badge}`;
                div.dataset.appId = id;

                // Taskbar hover preview with debouncing to prevent flicker
                let previewTimer = null;
                div.addEventListener('mouseenter', () => {
                    clearTimeout(previewTimer);
                    previewTimer = setTimeout(() => {
                        showTaskbarPreview(id, div);
                    }, 100);
                });
                div.addEventListener('mouseleave', () => {
                    clearTimeout(previewTimer);
                    previewTimer = setTimeout(() => {
                        taskbarPreview.classList.remove('visible');
                    }, 50);
                });

                div.onclick = () => {
                    if (document.body.classList.contains('desktop-mode')) {
                        if (!runningApps[id].winEl) launchApp(id);
                        else if (runningApps[id].winEl) {
                            if (runningApps[id].winEl.style.display === 'none') {
                                runningApps[id].winEl.style.display = 'flex';
                                bringToFront(runningApps[id].winEl);
                                runningApps[id].active = true;
                                updateTaskbar();
                            } else if (runningApps[id].active) {
                                minimizeWindow(id);
                                runningApps[id].active = false;
                                updateTaskbar();
                            } else {
                                bringToFront(runningApps[id].winEl);
                                runningApps[id].active = true;
                                updateTaskbar();
                            }
                        }
                    } else {
                        launchApp(id);
                    }
                };
                taskbarApps.appendChild(div);
            });
        }

        // ─── TASKBAR HOVER PREVIEW ───
        function showTaskbarPreview(appId, element) {
            const app = runningApps[appId];
            if (!app) return;
            const rect = element.getBoundingClientRect();
            const preview = taskbarPreview;
            const canvas = previewCanvas;

            // Position preview above the taskbar item
            preview.style.left = (rect.left + rect.width / 2 - 140) + 'px';
            preview.style.bottom = '60px';
            preview.style.display = 'block';
            preview.style.opacity = '1';

            previewLabel.textContent = app.app.name;

             // Capture iframe content to canvas (if iframe)
            if (app.app.type === 'iframe') {
                const iframe = app.contentNode.querySelector('iframe') || modalIframe;
                if (iframe && iframe.contentWindow) {
                    try {
                        // Try to access contentDocument – if CORS blocks, just show app name
                        const doc = iframe.contentDocument || iframe.contentWindow.document;
                        if (doc) {
                            const ctx = canvas.getContext('2d');
                            ctx.fillStyle = '#1e293b';
                            ctx.fillRect(0, 0, canvas.width, canvas.height);
                            ctx.fillStyle = '#3b82f6';
                            ctx.font = '32px sans-serif';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.fillText('📄', canvas.width / 2, canvas.height / 2 - 10);
                            ctx.fillStyle = '#f0f0f0';
                            ctx.font = '14px sans-serif';
                            ctx.fillText(app.app.name, canvas.width / 2, canvas.height / 2 + 40);
                        }
                    } catch (e) {
                        // CORS error - silently ignore and show fallback
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = '#1e293b';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.fillStyle = '#3b82f6';
                        ctx.font = '32px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('📄', canvas.width / 2, canvas.height / 2 - 10);
                        ctx.fillStyle = '#f0f0f0';
                        ctx.font = '14px sans-serif';
                        ctx.fillText(app.app.name, canvas.width / 2, canvas.height / 2 + 40);
                    }
                } else {
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#1e293b';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#3b82f6';
                    ctx.font = '32px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('📄', canvas.width / 2, canvas.height / 2 - 10);
                    ctx.fillStyle = '#f0f0f0';
                    ctx.font = '14px sans-serif';
                    ctx.fillText(app.app.name, canvas.width / 2, canvas.height / 2 + 40);
                }
            } else {
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#1e293b';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#3b82f6';
                ctx.font = '32px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('📄', canvas.width / 2, canvas.height / 2 - 10);
                ctx.fillStyle = '#f0f0f0';
                ctx.font = '14px sans-serif';
                ctx.fillText(app.app.name, canvas.width / 2, canvas.height / 2 + 40);
            }

            preview.classList.add('visible');
        }

        // ═══════════════════════════════════════════════════════════════════
        //  RECENTS DRAWER
        // ═══════════════════════════════════════════════════════════════════
        function renderRecentsDrawer() {
            if (!recentsList) return;
            if (recentApps.length === 0) {
                recentsList.innerHTML = '<div style="padding:16px;text-align:center;opacity:0.6;">No recent apps</div>';
                return;
            }
            recentsList.innerHTML = recentApps.map(app => `
            <div class="recent-item" data-id="${app.id}">
              <div class="app-icon-small"><i class="fas ${app.icon || 'fa-globe'}"></i></div>
              <span style="flex:1;font-weight:500;">${escapeHtml(app.name)}</span>
            </div>
          `).join('');
            recentsList.querySelectorAll('.recent-item').forEach(el => {
                const id = el.dataset.id;
                const app = recentApps.find(a => a.id === id);
                if (app) {
                    el.onclick = () => {
                        closeModal();
                        launchApp(app.id);
                        recentsDrawer.classList.remove('open');
                    };
                }
            });
        }

        // ═══════════════════════════════════════════════════════════════════
        //  RESIZE HANDLER
        // ═══════════════════════════════════════════════════════════════════
        function handleResize() {
            if (isResizing) return;
            isResizing = true;
            setTimeout(() => {
                const wasDesktop = document.body.classList.contains('desktop-mode');
                const nowMobile = isMobile();

                if (wasDesktop === !nowMobile) {
                    isResizing = false;
                    return;
                }

                if (nowMobile) {
                    document.body.classList.remove('desktop-mode');
                    Object.keys(runningApps).forEach(id => {
                        if (runningApps[id].winEl) {
                            runningApps[id].winEl.style.display = 'none';
                            runningApps[id].active = false;
                        }
                    });
                    const activeId = Object.keys(runningApps).find(id => runningApps[id].active);
                    if (activeId) {
                        const app = runningApps[activeId];
                        modalTitle.innerText = app.app.name;
                        modal.classList.remove('open');
                        if (app.app.type === 'iframe') {
                            const iframe = app.contentNode.querySelector('iframe');
                            if (iframe) {
                                modalIframe.src = iframe.src;
                                modalIframe.setAttribute('sandbox', iframe.getAttribute('sandbox') || '');
                                modalIframe.setAttribute('allow', iframe.getAttribute('allow') || '');
                            }
                        } else {
                            const mc = document.getElementById('modalContent');
                            mc.innerHTML = '';
                            mc.appendChild(app.contentNode);
                        }
                        modal.classList.add('open');
                    }
                    recalcPagination();
                    renderGrid();
                } else {
                    document.body.classList.add('desktop-mode');
                    modal.classList.remove('open');
        Object.keys(runningApps).forEach(id => {
            // ✅ SAFETY GUARD: Ensure contentNode is valid before creating window
            if (!runningApps[id].contentNode || !(runningApps[id].contentNode instanceof Node)) {
                console.warn(`Rewriting invalid contentNode for app: ${runningApps[id].app.name} during resize`);
                runningApps[id].contentNode = generateAppContent(runningApps[id].app);
            }
            if (!runningApps[id].winEl) {
                runningApps[id].winEl = createDesktopWindow(id, runningApps[id].app, runningApps[id].contentNode);
            } else {
                runningApps[id].winEl.style.display = 'flex';
            }
            runningApps[id].active = false;
        });
                    updateTaskbar();
                }
                isResizing = false;
            }, 50);
        }

        window.addEventListener('resize', handleResize);

        // ────────────────────────────────────────────────────────────────
        //  Virtual keyboard handling (Anti-Squish)
        // ────────────────────────────────────────────────────────────────
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                let keyboardHeight = window.innerHeight - window.visualViewport.height;
                
                // Note: We deliberately DO NOT change modalElem.style.bottom here.
                // Changing it physically squishes the DOM. We let the mobile browser pan natively.
                
                Object.values(runningApps).forEach(app => {
                    const iframe = app.contentNode?.querySelector('iframe');
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage({ type: 'keyboardHeight', height: keyboardHeight }, '*');
                    }
                });
            });
        }

        // ═══════════════════════════════════════════════════════════════════
        //  KEYBOARD NAVIGATION
        // ═══════════════════════════════════════════════════════════════════
        function isIframeActive() {
            if (!modal.classList.contains('open')) return false;
            try {
                const doc = modalIframe.contentDocument;
                if (!doc) return false;
                const active = doc.activeElement;
                return active && active.tagName !== 'BODY' && active.tagName !== 'HTML';
            } catch (e) { return false; }
        }

        window.addEventListener('keydown', (e) => {
            // Block all keyboard shortcuts when lock screen is locked
            if (lockScreen.classList.contains('locked')) return;
            if (isIframeActive()) return;

    // Spacebar: add app (only on home screen, not in inputs)
    if (e.key === ' ' && document.activeElement === document.body && !modal.classList.contains('open') && !taskSwitcher.classList.contains('open')) {
        e.preventDefault();
        sysDialog({
            type: 'prompt',
            title: 'Add App',
            message: 'Enter URL:',
            default: 'https://',
            placeholder: 'https://example.com'
        }).then(url => {
            if (url && url.trim()) addCustomApp(url.trim());
        });
        return;
    }

    // Grid navigation with arrow keys + Enter
    if ((document.activeElement === document.body) && !modal.classList.contains('open') && !taskSwitcher.classList.contains('open')) {
        const gridItems = document.querySelectorAll('.app-tile');
        if (gridItems.length > 0) {
            let cols = Math.floor(appGrid.offsetWidth / 116);
            if (cols < 1) cols = 1;
            if (['ArrowRight', 'ArrowLeft', 'ArrowDown', 'ArrowUp', 'Enter'].includes(e.key)) {
                e.preventDefault();
                if (focusedGridIndex === -1) focusedGridIndex = 0;
                else if (e.key === 'ArrowRight') focusedGridIndex = Math.min(focusedGridIndex + 1, gridItems.length - 1);
                else if (e.key === 'ArrowLeft') focusedGridIndex = Math.max(focusedGridIndex - 1, 0);
                else if (e.key === 'ArrowDown') focusedGridIndex = Math.min(focusedGridIndex + cols, gridItems.length - 1);
                else if (e.key === 'ArrowUp') focusedGridIndex = Math.max(focusedGridIndex - cols, 0);
                else if (e.key === 'Enter') { gridItems[focusedGridIndex].click(); return; }
                updateGridFocus();
                haptic();
                return;
            }
        }

        // Arrow left/right for page navigation (when no grid focus)
        if (e.key === 'ArrowLeft' && !modal.classList.contains('open')) {
            e.preventDefault();
            goToPage(currentPage - 1);
        } else if (e.key === 'ArrowRight' && !modal.classList.contains('open')) {
            e.preventDefault();
            goToPage(currentPage + 1);
        }
    }

    // Escape: close modal, switcher, menu, or app
    if (e.key === 'Escape') {
        if (modal.classList.contains('open')) closeModal();
        else if (taskSwitcher.classList.contains('open')) taskSwitcher.classList.remove('open');
        else if (startMenu.classList.contains('open')) startMenu.classList.remove('open');
        else if (document.body.classList.contains('desktop-mode')) {
            const wins = Array.from(document.querySelectorAll('.window')).sort((a, b) => b.style.zIndex - a.style.zIndex);
            if (wins.length > 0 && wins[0].style.display !== 'none') {
                const id = wins[0].id.replace('win-', '');
                closeApp(id);
            }
        }
    }
});

        // ═══════════════════════════════════════════════════════════════════
        //  TOUCH SWIPE FOR PAGINATION
        // ═══════════════════════════════════════════════════════════════════
        let touchStartX = 0,
            touchEndX = 0;
        pageViewport.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });
        pageViewport.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            const diff = touchEndX - touchStartX;
            if (Math.abs(diff) > 50) {
                if (diff > 0 && currentPage > 0) goToPage(currentPage - 1);
                else if (diff < 0 && currentPage < totalPages - 1) goToPage(currentPage + 1);
            }
        }, { passive: true });

        // ═══════════════════════════════════════════════════════════════════
        //  EDGE SWIPE GESTURES (Back)
        // ═══════════════════════════════════════════════════════════════════
        let swipeStartXEdge = 0;
        let swipeStartYEdge = 0;
        let isSwiping = false;
        let swipeTimeout = null;

        document.addEventListener('touchstart', (e) => {
            const t = e.touches[0];
            swipeStartXEdge = t.clientX;
            swipeStartYEdge = t.clientY;
            isSwiping = true;
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
            if (!isSwiping) return;
            const t = e.touches[0];
            const dx = t.clientX - swipeStartXEdge;
            const dy = t.clientY - swipeStartYEdge;
            if (Math.abs(dx) > Math.abs(dy) && dx > 40 && swipeStartXEdge < 20) {
                e.preventDefault();
                isSwiping = false;
                haptic();
                if (modal.classList.contains('open')) {
                    let responded = false;
                    const handler = (msg) => {
                        if (msg.data && msg.data.type === 'canGoBackResponse') {
                            responded = true;
                            window.removeEventListener('message', handler);
                            if (msg.data.canGoBack) {
                                modalIframe.contentWindow?.postMessage({ type: 'performBack' }, '*');
                            } else {
                                closeModal();
                            }
                        }
                    };
                    window.addEventListener('message', handler);
                    modalIframe.contentWindow?.postMessage({ type: 'canGoBack' }, '*');
                    swipeTimeout = setTimeout(() => {
                        window.removeEventListener('message', handler);
                        if (!responded) closeModal();
                    }, 300);
                } else {
                    goToPage(currentPage - 1);
                }
            }
        }, { passive: false });

        document.addEventListener('touchend', () => { isSwiping = false; }, { passive: true });

        // ═══════════════════════════════════════════════════════════════════
        //  NOTIFICATION DRAWER (Swipe down)
        // ═══════════════════════════════════════════════════════════════════
        let touchStartYNotif = 0;
        let isDraggingNotif = false;

        pageViewport.addEventListener('touchstart', (e) => {
            if (e.touches[0].clientY < 40) { touchStartYNotif = e.touches[0].clientY;
                isDraggingNotif = true; }
        }, { passive: true });

        pageViewport.addEventListener('touchmove', (e) => {
            if (!isDraggingNotif) return;
            let delta = e.touches[0].clientY - touchStartYNotif;
            if (delta > 30) {
                notifDrawer.classList.add('open');
                isDraggingNotif = false;
                setTimeout(() => {
                    document.addEventListener('click', function closeDrawer(e) {
                        if (!notifDrawer.contains(e.target)) notifDrawer.classList.remove('open');
                        document.removeEventListener('click', closeDrawer);
                    });
                }, 100);
            }
        }, { passive: true });

        pageViewport.addEventListener('touchend', () => { isDraggingNotif = false; }, { passive: true });

        // Auto-hide status bar on scroll
        let lastScrollY = 0;
pageViewport.addEventListener('scroll', () => {
    requestAnimationFrame(() => {
        let current = pageViewport.scrollTop;
        if (current > lastScrollY && current > 50) statusBar.classList.add('hide');
        else statusBar.classList.remove('hide');
        lastScrollY = current;
    });
}, { passive: true });

        // ═══════════════════════════════════════════════════════════════════
        //  THEME
        // ═══════════════════════════════════════════════════════════════════
        function toggleTheme() {
            darkMode = !darkMode;
            document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
            localStorage.setItem('theme', darkMode ? 'dark' : 'light');
            haptic(true);
        }
        themeToggleBtn.onclick = toggleTheme;

        // ═══════════════════════════════════════════════════════════════════
        //  FULLSCREEN
        // ═══════════════════════════════════════════════════════════════════
        fullscreenToggle.onclick = () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => toast('Fullscreen not supported'));
                toast('Entering fullscreen');
            } else {
                document.exitFullscreen();
                toast('Exiting fullscreen');
            }
            viewMenu.classList.remove('show');
        };

        // ─── SHUTDOWN OS ───
        window.shutdownOS = function() {
            if (document.fullscreenElement) {
                document.exitFullscreen().then(() => {
                    lockScreen.classList.remove('unlocked');
                    lockScreen.classList.add('locked');
                    isLocked = true;
                    Object.keys(runningApps).forEach(id => closeApp(id, true));
                    toast('Shutting down...');
                });
            } else {
                lockScreen.classList.remove('unlocked');
                lockScreen.classList.add('locked');
                isLocked = true;
                Object.keys(runningApps).forEach(id => closeApp(id, true));
                toast('Shutting down...');
            }
        };

        // ─── START MENU CLICK OUTSIDE ───
        document.addEventListener('click', (e) => {
            if (startMenu.classList.contains('open')) {
                if (!startMenu.contains(e.target) && e.target !== startBtn && !startBtn.contains(e.target)) {
                    startMenu.classList.remove('open');
                }
            }
        });

        // ═══════════════════════════════════════════════════════════════════
        //  LOCK SCREEN (with ripple and fullscreen)
        // ═══════════════════════════════════════════════════════════════════
        function lockScreenUnlock(e) {
            // Trigger haptic after a short delay to ensure user gesture is recognized
            setTimeout(() => {
                haptic(true);
            }, 50);

            const rect = lockIconWrapper.getBoundingClientRect();
            const x = (e.clientX || e.touches?.[0]?.clientX || rect.left + rect.width / 2) - rect.left;
            const y = (e.clientY || e.touches?.[0]?.clientY || rect.top + rect.height / 2) - rect.top;

    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    const size = Math.max(rect.width, rect.height);
    ripple.style.width = size + 'px';
    ripple.style.height = size + 'px';
    ripple.style.left = (x - size / 2) + 'px';
    ripple.style.top = (y - size / 2) + 'px';
    lockIconWrapper.appendChild(ripple);
    setTimeout(() => ripple.remove(), 800);

    document.body.dataset.interactive = 'false';

    if (document.body.classList.contains('desktop-mode')) {
                if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {
                lockScreen.classList.remove('locked');
                lockScreen.classList.add('unlocked');
                isLocked = false;
                toast('Unlocked');
                setTimeout(() => { document.body.dataset.interactive = 'true'; }, 200);
            }).then(() => {
                        lockScreen.classList.remove('locked');
                        lockScreen.classList.add('unlocked');
                        isLocked = false;
                        isFullscreen = true;
                        fullscreenWasUnlocked = true;
                        toast('Unlocked in fullscreen');
                        setTimeout(() => { document.body.dataset.interactive = 'true'; }, 200);
                    });
                } else {
                    lockScreen.classList.remove('locked');
                    lockScreen.classList.add('unlocked');
                    isLocked = false;
                    toast('Unlocked');
                    setTimeout(() => { document.body.dataset.interactive = 'true'; }, 200);
                }
            } else {
                lockScreen.classList.remove('locked');
                lockScreen.classList.add('unlocked');
                isLocked = false;
                toast('Unlocked');
                setTimeout(() => { document.body.dataset.interactive = 'true'; }, 200);
            }
        }

        function updateLockIcon() {
            if (document.body.classList.contains('desktop-mode')) {
                lockIcon.className = 'fas fa-lock lock-icon';
            } else {
                lockIcon.className = 'fas fa-fingerprint lock-icon';
            }
        }

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && fullscreenWasUnlocked) {
                fullscreenWasUnlocked = false;
                isFullscreen = false;
                lockScreen.classList.remove('unlocked');
                lockScreen.classList.add('locked');
                isLocked = true;
                toast('Locked (fullscreen exited)');
            }
        });

        lockIconWrapper.addEventListener('click', lockScreenUnlock);
        lockIconWrapper.addEventListener('touchstart', (e) => {
            lockScreenUnlock(e);
        }, { passive: true });

        let lastTap = 0;
        statusBar.addEventListener('click', () => {
            const now = Date.now();
            if (now - lastTap < 300) {
                haptic(true);
                lockScreen.classList.remove('unlocked');
                lockScreen.classList.add('locked');
                isLocked = true;
                if (!document.body.classList.contains('desktop-mode')) closeModal();
                else { Object.keys(runningApps).forEach(id => closeApp(id, true)); }
                toast('Locked');
            }
            lastTap = now;
        });

        // ═══════════════════════════════════════════════════════════════════
        //  BATTERY & TIME
        // ═══════════════════════════════════════════════════════════════════
        function updateClock() {
            let now = new Date();
            let t = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            liveTime.innerText = t;
            taskbarTime.innerText = t;
            lockTime.innerText = t;
            lockDate.innerText = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function initBattery() {
            if ('getBattery' in navigator) {
                try {
                    let b = await navigator.getBattery();
                    let update = () => {
                        let p = Math.round(b.level * 100);
                        batteryPercent.innerText = p + '%';
                        batteryFill.style.width = p + '%';
                        if (p <= 15) batteryFill.style.backgroundColor = '#ff3b30';
                        else if (p >= 95) batteryFill.style.backgroundColor = '#34c759';
                        else batteryFill.style.backgroundColor = 'white';
                    };
                    update();
                    b.addEventListener('levelchange', update);
                } catch (e) {}
            }
        }
        initBattery();

        // ═══════════════════════════════════════════════════════════════════
        //  VIEW MODE SWITCH
        // ═══════════════════════════════════════════════════════════════════
function setViewMode(mode) {
    viewMode = mode;
    localStorage.setItem('viewMode', viewMode);
    recalcPagination();
    if (currentPage >= totalPages) currentPage = totalPages - 1;
    if (currentPage < 0) currentPage = 0;
    renderGrid();
    renderDots();
    const tiles = document.querySelectorAll('.app-tile');
    if (focusedGridIndex >= tiles.length) focusedGridIndex = 0;
    updateGridFocus();
    toast('View: ' + mode);
}
        document.querySelectorAll('.menu-item[data-view]').forEach(el => {
            el.onclick = () => setViewMode(el.getAttribute('data-view'));
        });

        dotsBtn.onclick = (e) => { e.stopPropagation();
            viewMenu.classList.toggle('show'); };
        document.addEventListener('click', (e) => {
            if (!dotsBtn.contains(e.target) && !viewMenu.contains(e.target)) viewMenu.classList.remove('show');
        });

        // ═══════════════════════════════════════════════════════════════════
        //  MOBILE NAV BUTTONS
        // ═══════════════════════════════════════════════════════════════════
        homeBtn.onclick = () => {
            haptic();
            if (modal.classList.contains('open')) closeModal();
            else goToPage(0);
        };

        backBtn.onclick = () => {
    haptic();
    if (!modal.classList.contains('open')) { toast('No app open'); return; }
    const activeId = Object.keys(runningApps).find(id => runningApps[id].active);
    if (!activeId) { closeModal(); return; }
    const app = runningApps[activeId];
    if (app.app.type === 'native') {
        closeModal();
        return;
    }
    let responded = false;
    // Clear any previous backlog timeout (prevents overlapping timeouts when mashing back)
    if (window._backTimeout) clearTimeout(window._backTimeout);

    const handler = (msg) => {
        if (msg.data && msg.data.type === 'canGoBackResponse') {
            responded = true;
            window.removeEventListener('message', handler);
            if (window._backTimeout) {
                clearTimeout(window._backTimeout);
                window._backTimeout = null;
            }
            if (msg.data.canGoBack) {
                modalIframe.contentWindow?.postMessage({ type: 'performBack' }, '*');
            } else {
                closeModal();
            }
        }
    };
    window.addEventListener('message', handler);
    modalIframe.contentWindow?.postMessage({ type: 'canGoBack' }, '*');

    window._backTimeout = setTimeout(() => {
        window.removeEventListener('message', handler);
        if (!responded) closeModal();
        window._backTimeout = null;
    }, 300);
};

        recentsBtn.onclick = () => { haptic();
            recentsDrawer.classList.toggle('open');
            renderRecentsDrawer(); };

        closeSwitcher.onclick = () => taskSwitcher.classList.remove('open');
        closeModalBtn.onclick = closeModal;

        startBtn.onclick = () => { haptic();
            startMenu.classList.toggle('open'); };

        closeRecentsBtn.onclick = () => recentsDrawer.classList.remove('open');

        // ═══════════════════════════════════════════════════════════════════
        //  MESSAGE HANDLING (From iframes)
        // ═══════════════════════════════════════════════════════════════════
        window.addEventListener('message', (e) => {
            // SECURITY FIX: Only accept messages from our own iframes
            const senderId = findAppIdByFrame(e.source);
            if (!senderId) {
                // Ignore messages from unknown sources
                return;
            }
            if (e.data && e.data.type === 'setUnsaved') {
                if (senderId && runningApps[senderId]) runningApps[senderId].unsavedFlag = e.data.unsaved;
                if (senderId && document.body.classList.contains('desktop-mode') && runningApps[senderId]?.winEl) {
                    const titleEl = runningApps[senderId].winEl?.querySelector('.win-header div:first-child');
                    if (titleEl) {
                        titleEl.innerHTML =
                            `<i class="fas ${runningApps[senderId].app.icon || 'fa-globe'}" style="margin-right:6px;"></i>${escapeHtml(runningApps[senderId].app.name)}${e.data.unsaved ? ' ●' : ''}`;
                    }
                }
            } else if (e.data && e.data.type === 'saved') {
                if (senderId && runningApps[senderId]) runningApps[senderId].unsavedFlag = false;
            } else if (e.data && e.data.type === 'micActive') {
                micIndicator.style.display = e.data.active ? 'inline-block' : 'none';
            } else if (e.data && e.data.type === 'camActive') {
                camIndicator.style.display = e.data.active ? 'inline-block' : 'none';
            } else if (e.data && e.data.type === 'badge') {
                const app = findAppById(senderId);
                if (app) {
                    app.notificationCount = e.data.count || 0;
                    renderGrid();
                }
            }
        });

        function findAppIdByFrame(frameWindow) {
            for (let [id, app] of Object.entries(runningApps)) {
                const iframe = app.contentNode?.querySelector('iframe') || modalIframe;
                if (iframe && iframe.contentWindow === frameWindow) return id;
            }
            return null;
        }

        // ═══════════════════════════════════════════════════════════════════
        //  LOAD SAVED DATA
        // ═══════════════════════════════════════════════════════════════════
        let savedCustom = localStorage.getItem('customApps');
        if (savedCustom) try { customApps = JSON.parse(savedCustom); } catch (e) {}
        let savedRecents = localStorage.getItem('recentApps');
        if (savedRecents) try { recentApps = JSON.parse(savedRecents); } catch (e) {}
        let savedView = localStorage.getItem('viewMode');
        if (savedView && ['large', 'medium', 'small', 'list', 'detail'].includes(savedView)) viewMode = savedView;
        let savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') { darkMode = false;
            document.documentElement.setAttribute('data-theme', 'light'); }
        let savedOrder = localStorage.getItem('appOrder');
        if (savedOrder) try { appOrder = JSON.parse(savedOrder); } catch (e) {}

        // ─── Restore runningApps state ───
        let savedRunning = localStorage.getItem('runningAppsState');
        if (savedRunning) {
            try {
                const parsed = JSON.parse(savedRunning);
                for (let [id, appData] of Object.entries(parsed)) {
                    // Find the original app definition
                    const appDef = findAppById(id);
                    if (appDef) {
                        // Recreate the app object without DOM nodes – they will be regenerated on launch
                        runningApps[id] = {
                            app: appDef,
                            contentNode: null, // will be created when launched
                            winEl: null,
                            unsavedFlag: appData.unsavedFlag || false,
                            componentData: appData.componentData || null,
                            scrollY: appData.scrollY || 0,
                            lastActive: appData.lastActive || Date.now(),
                            focusedSelector: appData.focusedSelector || null,
                            active: false
                        };
                    }
                }
            } catch (e) {
                console.warn('Could not restore runningApps state:', e);
            }
        }

        // ─── State persistence: save runningApps to localStorage ───
        function saveStateToLocalStorage() {
            try {
                // Create a safe copy of runningApps without DOM nodes
                const stateCopy = {};
                for (let [id, app] of Object.entries(runningApps)) {
                    stateCopy[id] = {
                        app: {
                            id: app.app.id,
                            name: app.app.name,
                            type: app.app.type,
                            component: app.app.component,
                            url: app.app.url,
                            icon: app.app.icon
                        },
                        componentData: app.componentData,
                        scrollY: app.scrollY,
                        focusedSelector: app.focusedSelector,
                        unsavedFlag: app.unsavedFlag,
                        lastActive: app.lastActive
                    };
                }
                localStorage.setItem('runningAppsState', JSON.stringify(stateCopy));
            } catch (e) {
                console.warn('Could not save runningApps state:', e);
            }
        }
        // ═══════════════════════════════════════════════════════════════════
        //  INIT
        // ═══════════════════════════════════════════════════════════════════
        function init() {
            updateLockIcon();
            recalcPagination();
            renderGrid();
            renderDots();
            renderStartMenu();
            renderRecentsDrawer();
            handleResize();
            if (!localStorage.getItem('notifShown')) {
                setTimeout(() => {
                    addNotification('🚀 Unified OS v6.0 ready — All your apps, all your data', 'rocket');
                    localStorage.setItem('notifShown', 'true');
                }, 500);
            }
        }

        init();

        // ─── Auto‑save runningApps state every 5 seconds ───
        setInterval(saveStateToLocalStorage, 5000);

        // ─── Also save when the page is about to unload ───
        window.addEventListener('beforeunload', () => {
            saveStateToLocalStorage();
        });

        console.log('🚀 Unified OS v6.0 — Phone + Desktop (Full Combo)');
        console.log('📱 Phone mode (mobile) | 🖥️ Desktop mode (desktop)');
        console.log('🔒 Double-tap status bar to lock | Press Space to add app');
        console.log('🔄 Drag & Drop to reorder apps | Edge swipe for back');
        console.log('💧 Ripple effect on unlock | 🖼️ Taskbar hover preview');
        console.log('⏻ Shutdown exits fullscreen and locks');
        console.log('✅ Sandbox + Allow flags fully configured');
        console.log('✅ 10s load timeout + error overlay');
        console.log('✅ PostMessage back negotiation');
        console.log('✅ Resize observer + keyboard height');
        console.log('✅ Top-level navigation prevented');
        console.log('✅ State persistence: runningApps auto‑saved every 5 seconds');
    </script>
</body>
