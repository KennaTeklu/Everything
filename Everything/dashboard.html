<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Interactive Demo</title>
    <style>
        body {
            font-family: system-ui, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h2 {
            color: #1e293b;
            margin-bottom: 1rem;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        button:active {
            transform: scale(0.97);
        }
        button:hover {
            background: #2563eb;
        }
        .counter {
            font-size: 3rem;
            font-weight: bold;
            margin: 1rem 0;
            color: #3b82f6;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>📊 Live Dashboard</h2>
    <p>This demo shows that interactive scripts work inside the iframe.</p>
    <div class="counter" id="counterDisplay">0</div>
    <button id="incrementBtn">➕ Increment</button>
    <p style="margin-top: 1rem; font-size: 0.8rem; color: #475569;">
        ✅ JavaScript, alerts, and local storage (not shown) all function normally.
    </p>
</div>
<script>
    let count = 0;
    const display = document.getElementById('counterDisplay');
    const btn = document.getElementById('incrementBtn');
    btn.addEventListener('click', () => {
        count++;
        display.textContent = count;
    });
</script>
</body>
</html>
